<body>

    <div id="waitlist-overlay">
        <div class="waitlist-container">

            <h2 class="waitlist-title">
                Kaem Kaar
            </h2>

            <p class="waitlist-sub">
                The future of work in J&K. Join the waitlist.
            </p>

            <form name="submit-to-google-sheet">

                <div class="form-group">
                    <label>Full Name</label>

                    <input
                        type="text"
                        name="Name"
                        required
                        placeholder="Arif Khan"
                    >
                </div>

                <div class="form-group">
                    <label>Phone Number</label>

                    <input
                        type="tel"
                        name="PhoneNo"
                        required
                        placeholder="9906XXXXXX"
                    >
                </div>

                <div class="form-group">
                    <label>Email Address</label>

                    <input
                        type="email"
                        name="Email"
                        required
                        placeholder="arif@email.com"
                    >
                </div>

                <div class="form-group">
                    <label>Role</label>

                    <select name="Role" required>
                        <option value="" disabled selected>
                            Select Role
                        </option>

                        <option value="Worker">
                            Worker
                        </option>

                        <option value="Hirer">
                            Hirer
                        </option>
                    </select>
                </div>

                <button
                    type="submit"
                    class="btn-submit"
                    id="submit-btn"
                >
                    Join Waitlist →
                </button>

                <button
                    type="button"
                    id="skip-btn"
                >
                    Skip and explore site
                </button>

            </form>

            <p id="msg"></p>

        </div>
    </div>

    <!-- NAV -->
    <nav>
        <div class="nav-logo">KaemKaar</div>

        <ul class="nav-links">
            <li><a href="#about">About</a></li>
            <li><a href="#features">Features</a></li>
            <li><a href="#waitlist">Waitlist</a></li>
            <li><a href="#team">Team</a></li>
            <li><a href="#waitlist" class="nav-btn">Join Now</a></li>
        </ul>
    </nav>
