<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaemKaar – Waitlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #EDE0CC;
            --red: #B22222;
            --dark: #1A1008;
            --muted: #7A6A55;
            --white: #FDFAF4;
            --card-bg: #F5ECD8;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            color: var(--dark);
            display: flex;
            justify-content: center;
            padding: 2rem;
            transition: opacity 0.5s ease;
        }

        /* Waitlist Section Styling */
        #waitlist {
            width: 100%;
            max-width: 500px;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .waitlist-container {
            background: var(--white);
            padding: 3rem;
            border-radius: 32px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            color: var(--muted);
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 0.9rem;
            border-radius: 12px;
            border: 1px solid rgba(26,16,8,0.1);
            background: var(--card-bg);
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        .btn-submit {
            background: var(--red);
            color: var(--white);
            padding: 1rem 2rem;
            border-radius: 100px;
            border: none;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-submit:disabled {
            background: var(--muted);
            cursor: not-allowed;
        }

        #skip-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.85rem;
            margin-top: 1rem;
            transition: color 0.3s;
        }

        #skip-btn:hover {
            color: var(--red);
        }

        #msg {
            margin-top: 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            min-height: 1.2em;
        }
    </style>
</head>
<body>

    <section id="waitlist">
        <div class="waitlist-container">
            <h2>Join KaemKaar</h2>
            <p style="color: var(--muted); margin-bottom: 2rem;">Be the first to access local jobs in J&K.</p>

            <form name="submit-to-google-sheet">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="Name" placeholder="e.g. Arif Khan" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="PhoneNo" placeholder="e.g. 9906XXXXXX" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="Email" placeholder="name@email.com" required>
                </div>

                <div class="form-group">
                    <label>I want to join as</label>
                    <select name="Role" required>
                        <option value="" disabled selected>Select your role</option>
                        <option value="Worker">Worker (Looking for work)</option>
                        <option value="Hirer">Hirer (Looking to hire)</option>
                    </select>
                </div>

                <div class="form-actions" style="margin-top: 1.5rem; display: flex; flex-direction: column; align-items: center;">
                    <button type="submit" class="btn-submit">Submit Registration →</button>
                    <button type="button" id="skip-btn">Skip for now, show me the site</button>
                </div>
            </form>

            <p id="msg"></p>
        </div>
    </section>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxSOlVLJq04sHFcOiRhkGopIZny6xPB7wENvyuaDg170nJMKZdKyOla6kxWnqOzjOd_Ng/exec';
        const form = document.forms['submit-to-google-sheet'];
        const msg = document.getElementById("msg");
        const skipBtn = document.getElementById('skip-btn');
        const waitlistSection = document.getElementById('waitlist');

        // Logic to hide form and show homepage
        function showHomepage() {
            // If the landing page content is on the same page, scroll to it
            // Otherwise, this fades the form out
            waitlistSection.style.opacity = '0';
            waitlistSection.style.transform = 'translateY(-20px)';
            
            setTimeout(() => {
                waitlistSection.style.display = 'none';
                // If your homepage sections have IDs like #hero or #about, 
                // ensure they are not set to display:none in your main CSS.
                const target = document.getElementById('about');
                if(target) target.scrollIntoView({ behavior: 'smooth' });
            }, 600);
        }

        form.addEventListener('submit', e => {
            e.preventDefault();
            const submitBtn = form.querySelector('.btn-submit');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = "Processing...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    msg.innerHTML = "Registration Successful! Redirecting...";
                    msg.style.color = "green";
                    submitBtn.innerHTML = "Success!";
                    
                    // Redirect to homepage after 1.5 seconds
                    setTimeout(showHomepage, 1500);
                })
                .catch(error => {
                    msg.innerHTML = "Something went wrong. Please try again.";
                    msg.style.color = "var(--red)";
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = "Submit Registration →";
                    console.error('Error!', error.message);
                });
        });

        // Skip logic
        skipBtn.addEventListener('click', showHomepage);
    </script>
</body>
</html>
